description: |
  A minimal dependency injection framework for Ruby, using vanilla Ruby semantics to define and reference dependencies from different providers.
github:
  repository_url: https://github.com/sleepingkingstudios/plumbum
markdown: kramdown
repository: sleepingkingstudios/plumbum
theme: jekyll-theme-dinky
title: Plumbum
